<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    
    <!-- Basic SEO -->
    <meta name="application-name" content="KidStory" />
    <meta name="description" content="KidStory 是 AI 插画与绘本创作平台，支持 AI 生图、角色与组图绘本、心情日记、在线编辑与 PDF 导出，浏览原创插画与绘本作品。" />
    <meta name="keywords" content="KidStory,AI插画,AI绘本,儿童绘本,插画创作,绘本创作,在线编辑器,图元上传,PDF导出,心情日记,原创插画" />
    <meta name="author" content="KidStory" />
    <meta name="robots" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="canonical" href="https://www.kidstory.cc/" />
    
    <!-- Baidu site verification -->
    <meta name="baidu-site-verification" content="V7wRjEU2Jw4ywZH8" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="KidStory" />
    <meta property="og:title" content="KidStory | AI插画与绘本创作平台" />
    <meta property="og:description" content="AI 插画与绘本创作平台：AI 生图、角色创作、组图绘本、心情日记、在线编辑与 PDF 导出。" />
    <meta property="og:url" content="https://www.kidstory.cc/" />
    <meta property="og:image" content="https://www.kidstory.cc/android-chrome-512x512.png" />
    <meta property="og:image:alt" content="KidStory 插画与绘本创作平台" />
    
    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="KidStory | AI插画与绘本创作平台" />
    <meta name="twitter:description" content="AI 插画与绘本创作平台：AI 生图、角色创作、组图绘本、心情日记、在线编辑与 PDF 导出。" />
    <meta name="twitter:image" content="https://www.kidstory.cc/android-chrome-512x512.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="<%= BASE_URL %>favicon.ico">
    
    <!-- 多种尺寸的图标（如果有的话） -->
    <!-- 16x16 PNG -->
    <link rel="icon" type="image/png" sizes="16x16" href="<%= BASE_URL %>favicon-16x16.png">
    <!-- 32x32 PNG -->
    <link rel="icon" type="image/png" sizes="32x32" href="<%= BASE_URL %>favicon-32x32.png">
    <!-- 192x192 PNG (Android) -->
    <link rel="icon" type="image/png" sizes="192x192" href="<%= BASE_URL %>android-chrome-192x192.png">
    <!-- 512x512 PNG (Android/PWA) -->
    <link rel="icon" type="image/png" sizes="512x512" href="<%= BASE_URL %>android-chrome-512x512.png">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="<%= BASE_URL %>apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="KidStory" />
    
    <!-- Web Manifest -->
    <link rel="manifest" href="<%= BASE_URL %>site.webmanifest">
    
    <!-- 关键 CSS 内联（首屏渲染必需，减少渲染阻塞） -->
    <style>
      html, body { height: 100%; overflow-y: auto; margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; }
      #app { font-family: "PingFang SC", "Lantinghei SC", "Microsoft YaHei", "HanHei SC", "Helvetica Neue", "Open Sans", Arial, "Hiragino Sans GB", 微软雅黑, STHeiti, "WenQuanYi Micro Hei", SimSun, sans-serif, HYWenHei-GEW; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-align: center; color: #2c3e50; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
      .app-main { flex: 1; width: 100%; overflow: hidden; padding-top: 50px; }
    </style>
    
    <title><%= htmlWebpackPlugin.options.title %></title>
  </head>
  <body>
    <noscript>
      <strong>KidStory 需要启用 JavaScript 才能正常使用，请在浏览器设置中开启后刷新页面。</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
